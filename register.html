<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

/* Background image */
background:url("https://m.economictimes.com/thumb/msid-112814886,width-1200,height-900,resizemode-4,imgsize-33936/govt-resolved-over-50-pc-of-public-grievances-on-cpgrams-portal-in-the-first-15-days-of-june.jpg") 
no-repeat center center/cover;
}

/* Dark overlay for readability */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:0;
}

/* Form container */

.container{
position:relative;
z-index:1;

background:white;
padding:35px;
border-radius:12px;
width:320px;

text-align:center;

box-shadow:0px 8px 25px rgba(0,0,0,0.4);
}

/* Heading */

h2{
color:#2c3e50;
margin-bottom:20px;
}

/* Input fields */

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
outline:none;
transition:0.3s;
}

/* Input focus effect */

input:focus{
border-color:#3498db;
box-shadow:0 0 5px rgba(52,152,219,0.5);
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;

background:#3498db;
color:white;
border:none;
border-radius:6px;

font-size:16px;
cursor:pointer;
transition:0.3s;
}

/* Hover effect */

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="container">

<h2>User Registration</h2>

<input id="name" placeholder="Name">

<input id="email" placeholder="Email">

<input id="phone" placeholder="Phone">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

</div>

<script src="script.js"></script>

</body>
</html>
