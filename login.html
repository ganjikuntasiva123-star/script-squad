<!DOCTYPE html>
<html>
<head>
<title>Admin Login - Citizen Grievance Portal</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#2c3e50,#4ca1af);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:flex;
width:700px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.image-section{
background:#3498db;
width:50%;
display:flex;
justify-content:center;
align-items:center;
}

.image-section img{
width:200px;
}

.form-section{
width:50%;
padding:40px;
text-align:center;
}

h2{
color:#2c3e50;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2ecc71;
}

</style>
</head>

<body>

<div class="container">

<div class="image-section">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
</div>

<div class="form-section">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Admin Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<script>

const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "1234";

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user===ADMIN_USERNAME && pass===ADMIN_PASSWORD){

localStorage.setItem("admin","true")

window.location.href="admin.html"

}else{

alert("Invalid Admin Credentials")

}

}

</script>

</body>
</html>
