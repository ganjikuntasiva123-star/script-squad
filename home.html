<!DOCTYPE html>
<html>
<head>
<title>Square Home Button</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f6f9;
}

/* Square Button */

.home-btn{
width:120px;
height:120px;
background:#3498db;
color:white;
text-decoration:none;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

border-radius:12px;
font-size:18px;
font-weight:bold;

box-shadow:0 6px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.home-btn:hover{
background:#2980b9;
transform:scale(1.05);
}

/* Icon */

.home-icon{
font-size:40px;
margin-bottom:8px;
}

</style>

</head>

<body>

<a href="home.html" class="home-btn">

<div class="home-icon">🏠</div>

HOME

</a>

</body>
</html>
