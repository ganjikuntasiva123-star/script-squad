<!DOCTYPE html>
<html>
<head>
<title>Admin Monitoring Dashboard</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(120deg,#3498db,#8e44ad);
}

/* Header */

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

/* Navigation */

nav{
background:#34495e;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#f1c40f;
}

/* Container */

.container{
width:90%;
margin:auto;
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

/* Table */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#3498db;
color:white;
}

/* Status dropdown */

select{
padding:6px;
border-radius:4px;
}

/* Button */

button{
padding:8px 12px;
background:#27ae60;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#2ecc71;
}

/* Logout */

.logout{
float:right;
background:#e74c3c;
}

.logout:hover{
background:#c0392b;
}

</style>

</head>

<body>

<header>
<h1>Admin Monitoring Dashboard</h1>
</header>

<nav>
<a href="index.html">Home</a>
<button class="logout" onclick="logout()">Logout</button>
</nav>

<div class="container">

<h2>Citizen Complaints Monitoring</h2>

<table id="complaintTable">

<tr>
<th>ID</th>
<th>Title</th>
<th>Category</th>
<th>Location</th>
<th>Status</th>
<th>Update</th>
</tr>

</table>

</div>

<script>

/* Login protection */

if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="admin-login.html"
}

/* Load complaints */

let complaints = JSON.parse(localStorage.getItem("complaints")) || []

let table = document.getElementById("complaintTable")

complaints.forEach((c,index)=>{

let row = document.createElement("tr")

row.innerHTML = `
<td>${c.id}</td>
<td>${c.title}</td>
<td>${c.category}</td>
<td>${c.location}</td>

<td>
<select id="status${index}">
<option ${c.status==="Submitted"?"selected":""}>Submitted</option>
<option ${c.status==="Under Review"?"selected":""}>Under Review</option>
<option ${c.status==="Assigned"?"selected":""}>Assigned</option>
<option ${c.status==="In Progress"?"selected":""}>In Progress</option>
<option ${c.status==="Resolved"?"selected":""}>Resolved</option>
</select>
</td>

<td>
<button onclick="updateStatus(${index})">Update</button>
</td>
`

table.appendChild(row)

})

/* Update status */

function updateStatus(i){

let newStatus=document.getElementById("status"+i).value

complaints[i].status=newStatus

localStorage.setItem("complaints",JSON.stringify(complaints))

alert("Status Updated")

}

/* Logout */

function logout(){

localStorage.removeItem("adminLoggedIn")

window.location.href="admin-login.html"

}

</script>

</body>
</html>
